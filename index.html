<!DOCTYPE html>
<html>
<head>
    <title>Deteksi Buah</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4 text-center">

        <h2 class="mb-4">🍎 Deteksi Buah Segar atau Busuk</h2>

        <form method="post" enctype="multipart/form-data">
            <input class="form-control mb-3" type="file" name="image" required>
            <button class="btn btn-primary w-100">Upload & Cek</button>
        </form>

        {% if image_path %}
            <div class="mt-4">
                <h5>Gambar:</h5>
                <img src="{{ image_path }}" class="img-fluid rounded shadow" width="300">
            </div>
        {% endif %}

        {% if result %}
            <div class="mt-4">
                <h4 class="fw-bold">
                    Hasil: {{ result }}
                </h4>
            </div>
        {% endif %}

    </div>
</div>

</body>
</html>
